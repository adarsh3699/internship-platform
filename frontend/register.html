<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create Account – InternBridge</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>"
        />
        <link rel="stylesheet" href="/css/styles.css" />
    </head>
    <body>
        <div id="navbar"></div>
        <main id="app">
            <div
                class="auth-container"
                style="min-height: 100vh; padding: 2rem 1.5rem"
            >
                <div class="auth-bg">
                    <div class="hero-orb hero-orb-1"></div>
                    <div class="hero-orb hero-orb-2"></div>
                </div>
                <div class="auth-card" style="max-width: 560px">
                    <div class="auth-header">
                        <div class="auth-icon">✨</div>
                        <h2 class="auth-title">Create Account</h2>
                        <p class="auth-subtitle">
                            Join InternBridge – it's completely free
                        </p>
                    </div>
                    <div class="role-selector" id="roleSelector">
                        <div
                            class="role-card active"
                            id="roleStudent"
                            onclick="selectRole('student')"
                        >
                            <div class="role-card-icon">🎓</div>
                            <div class="role-card-title">I'm a Student</div>
                            <div class="role-card-desc">
                                Find internships & projects
                            </div>
                        </div>
                        <div
                            class="role-card"
                            id="roleOrg"
                            onclick="selectRole('organization')"
                        >
                            <div class="role-card-icon">🏢</div>
                            <div class="role-card-title">
                                I'm an Organization
                            </div>
                            <div class="role-card-desc">
                                Post opportunities & hire
                            </div>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label"
                                >Full Name
                                <span class="form-required">*</span></label
                            >
                            <input
                                class="form-input"
                                id="regName"
                                placeholder="John Doe"
                            />
                        </div>
                        <div class="form-group">
                            <label class="form-label"
                                >Email
                                <span class="form-required">*</span></label
                            >
                            <input
                                class="form-input"
                                id="regEmail"
                                type="email"
                                placeholder="you@example.com"
                            />
                        </div>
                    </div>

                    <div id="orgFields" style="display: none">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label"
                                    >Company Name
                                    <span class="form-required">*</span></label
                                >
                                <input
                                    class="form-input"
                                    id="regCompany"
                                    placeholder="Acme Corp"
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Industry</label>
                                <select class="form-select" id="regIndustry">
                                    <option value="">Select Industry</option>
                                    <option>Technology</option>
                                    <option>Healthcare</option>
                                    <option>Finance</option>
                                    <option>Education</option>
                                    <option>Marketing</option>
                                    <option>Design</option>
                                    <option>Engineering</option>
                                    <option>E-commerce</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="studentFields">
                        <div class="form-group">
                            <label class="form-label"
                                >Skills
                                <span class="form-hint" style="display: inline"
                                    >(comma-separated)</span
                                ></label
                            >
                            <input
                                class="form-input"
                                id="regSkills"
                                placeholder="JavaScript, Python, Figma, React"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label"
                            >Password
                            <span class="form-required">*</span></label
                        >
                        <input
                            class="form-input"
                            id="regPassword"
                            type="password"
                            placeholder="Min. 6 characters"
                        />
                    </div>
                    <button
                        class="btn btn-primary"
                        style="
                            width: 100%;
                            justify-content: center;
                            margin-top: 0.5rem;
                        "
                        id="regBtn"
                        onclick="handleRegister()"
                    >
                        Create Account 🚀
                    </button>
                    <div class="auth-divider">or</div>
                    <p
                        style="
                            text-align: center;
                            font-size: 0.9rem;
                            color: var(--text-3);
                        "
                    >
                        Already have an account?
                        <a href="/login.html" class="auth-link">Sign in</a>
                    </p>
                </div>
            </div>
        </main>
        <script src="./js/api.js"></script>
        <script src="./js/components.js"></script>
        <script src="./js/register.js"></script>
    </body>
</html>
